<body>
    <div class="container">
        <div class="brand">bimbim.ai</div>

        <div class="header">
            <h1>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z" />
                    <path d="M2 17l10 5 10-5" />
                    <path d="M2 12l10 5 10-5" />
                </svg>
                bimbim.chat
            </h1>
            <div class="status">
                <div class="status-dot" id="statusDot"></div>
                <span id="connectionStatus">menyambung…</span>
            </div>
        </div>

        <!-- model-info dihapus total -->

        <div class="chat-area" id="chatArea">
            <div class="welcome-message" id="welcomeMessage">
                <h3>🔥 siap membantu</h3>
                <p>
                    menunggu koneksi ke AI pusat…<br />
                    sebentar, sistem sedang memeriksa.
                </p>
            </div>
        </div>

        <div class="input-area">
            <textarea id="userInput" placeholder="ketik pesan …" rows="1" disabled></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
                <svg viewBox="0 0 24 24">
                    <path d="M2 21l21-9L2 3v7l15 2-15 2v7z" />
                </svg>
            </button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_URL = 'https://albuquerque-satellite-inches-showing.trycloudflare.com';

        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const toast = document.getElementById('toast');
        const statusDot = document.getElementById('statusDot');
        const connectionStatus = document.getElementById('connectionStatus');
        const welcomeMessage = document.getElementById('welcomeMessage');

        let isLoading = false;
        let isConnected = false;
        let currentModel = 'qwen'; // tetap pakai qwen di belakang, tapi tidak ditampilkan

        // ── auto-resize textarea ──
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 140) + 'px';
        });

        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // ── toast ──
        function showToast(message, type = 'info') {
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            clearTimeout(toast._hide);
            toast._hide = setTimeout(() => toast.classList.remove('show'), 4800);
        }

        // ── status ──
        function setConnectionStatus(status, message) {
            statusDot.className = 'status-dot';
            if (status === 'online') {
                statusDot.classList.add('online');
                statusDot.style.background = '#fb923c';
            } else if (status === 'offline') {
                statusDot.classList.add('offline');
                statusDot.style.background = '#dc2626';
            } else {
                statusDot.classList.add('checking');
                statusDot.style.background = '#fbbf24';
            }
            connectionStatus.textContent = message;
        }

        function enableChat() {
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
            isConnected = true;

            if (welcomeMessage) {
                welcomeMessage.innerHTML = `
                    <h3>✅ siap ngobrol</h3>
                    <p>AI sudah online. ketik apa pun di bawah.</p>
                `;
            }
        }

        function disableChat() {
            userInput.disabled = true;
            sendBtn.disabled = true;
            isConnected = false;

            if (welcomeMessage) {
                welcomeMessage.innerHTML = `
                    <h3>⛔ gagal terhubung</h3>
                    <p>cek tunnel &amp; ollama, lalu refresh.</p>
                `;
            }
        }

        // ── message helpers ──
        function addMessage(text, isUser, isError = false) {
            if (welcomeMessage) welcomeMessage.remove();

            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'ai'} ${isError ? 'error' : ''}`;
            div.textContent = text;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
            return div;
        }

        function addLoadingMessage() {
            const div = document.createElement('div');
            div.className = 'message ai loading';
            div.id = 'loadingMessage';
            div.innerHTML = `
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
                <span>sedang mikir…</span>
            `;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
            return div;
        }

        function removeLoadingMessage() {
            const el = document.getElementById('loadingMessage');
            if (el) el.remove();
        }

        // ── test koneksi ──
        async function testConnection() {
            setConnectionStatus('checking', 'menghubungkan…');

            try {
                const start = Date.now();
                const resp = await fetch(`${API_URL}/api/tags`, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

                const data = await resp.json();

                if (data.models && data.models.length > 0) {
                    const model = data.models[0];
                    currentModel = model.name; // tetap pakai qwen di belakang
                    // ── TIDAK ADA LAGI ELEMENT MODEL-INFO ──
                    setConnectionStatus('online', 'terhubung');
                    showToast(`✅ AI siap (${model.name})`, 'success');
                    enableChat();
                } else {
                    throw new Error('tidak ada model. jalankan: ollama pull qwen');
                }

            } catch (err) {
                console.error('Connection error:', err);
                setConnectionStatus('offline', 'gagal');
                disableChat();
                showToast(`❌ gagal konek: ${err.message || 'cek tunnel & ollama'}`, 'error');
            }
        }

        // ── kirim pesan ──
        async function sendMessage() {
            if (isLoading || !isConnected) return;

            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, true);
            userInput.value = '';
            userInput.style.height = 'auto';

            isLoading = true;
            sendBtn.disabled = true;
            addLoadingMessage();

            const startTime = Date.now();

            try {
                const resp = await fetch(`${API_URL}/api/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: currentModel,
                        prompt: text,
                        stream: false
                    })
                });

                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

                const data = await resp.json();
                removeLoadingMessage();

                if (data.response) {
                    addMessage(data.response, false);
                } else if (data.error) {
                    throw new Error(data.error);
                }

                // status tetap online
                setConnectionStatus('online', 'terhubung');

            } catch (err) {
                removeLoadingMessage();
                console.error('Chat error:', err);

                let msg = 'gagal: ';
                if (err.message.includes('Failed to fetch')) {
                    msg += 'koneksi putus. cek tunnel & ollama.';
                    setConnectionStatus('offline', 'terputus');
                    disableChat();
                } else {
                    msg += err.message;
                }

                addMessage(msg, false, true);
                showToast(msg, 'error');
            } finally {
                isLoading = false;
                if (isConnected) sendBtn.disabled = false;
            }
        }

        // ── start ──
        window.addEventListener('load', () => {
            setTimeout(testConnection, 600);
        });
    </script>
</body>
</html>
